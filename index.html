<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="utf-8"/>
  <title>CityMap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c7be5">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-512.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="styles.css">
    
</head>

<body>

  <div id="northIndicator" title="Észak" aria-label="Észak">
    <div class="ni-inner">
      <span class="ni-arrow">▲</span>
      <span class="ni-n">N</span>
    </div>
  </div>

  <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-filter" viewBox="0 0 24 24">
      <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z" fill="currentColor"/>
    </symbol>
    <symbol id="i-filter-x" viewBox="0 0 24 24">
      <path d="M3 5h18l-7 8v5l-4 2v-7L3 5z" fill="currentColor"/>
      <path d="M16.5 8.5l4 4m0-4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-settings" viewBox="0 0 24 24">
      <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.04 7.04 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.12.52-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.41 1.05.73 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.8a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.12-.52 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z" fill="currentColor"/>
    </symbol>
    <symbol id="i-camera" viewBox="0 0 24 24">
      <path d="M9 4l1.5 2H14l1.5-2H19a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4z" fill="currentColor"/>
      <path d="M12 9a4 4 0 1 0 0 8a4 4 0 0 0 0-8z" fill="#fff" opacity=".9"/>
      <path d="M12 10.5a2.5 2.5 0 1 0 0 5a2.5 2.5 0 0 0 0-5z" fill="currentColor"/>
    </symbol>
    <symbol id="i-loc" viewBox="0 0 24 24">
      <path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7zm0 9.5A2.5 2.5 0 1 0 12 6a2.5 2.5 0 0 0 0 5.5z" fill="currentColor"/>
    </symbol>
<symbol id="i-compass" viewBox="0 0 24 24">
  <path d="M12 2a10 10 0 1 0 .001 20.001A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 .001-16.001A8 8 0 0 1 12 20z"/>
  <path d="M14.8 9.2l-2.1 5.6-5.6 2.1 2.1-5.6 5.6-2.1zm-4.2 6.1l1.6-1.6.9-2.5-2.5.9-1.6 1.6-.9 2.5 2.5-.9z"/>
</symbol>

    <symbol id="i-trash" viewBox="0 0 24 24">
      <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v10h-2V9zm4 0h2v10h-2V9zM7 9h2v10H7V9z" fill="currentColor"/>
    </symbol>
    <symbol id="i-eye" viewBox="0 0 24 24">
      <path d="M12 5c-7.6 0-10 7-10 7s2.4 7 10 7 10-7 10-7-2.4-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z" fill="currentColor"/>
    </symbol>
    <symbol id="i-eye-off" viewBox="0 0 24 24">
      <path d="M12 5c-7.6 0-10 7-10 7 1.1 3.2 3.5 5.6 6.7 6.6l1.7-1.7A5 5 0 0 1 7 12c0-.7.1-1.3.3-1.9L5.1 7.9C3.8 9.4 2.9 11 2 12c0 0 2.4 7 10 7 1.6 0 3-.3 4.2-.8l-1.6-1.6c-.8.3-1.7.4-2.6.4-2.8 0-5-2.2-5-5 0-.9.2-1.8.6-2.6l-1.7-1.7A6.9 6.9 0 0 0 5 12c0 3.9 3.1 7 7 7 1.4 0 2.7-.4 3.8-1.1l1.4 1.4c1.5-1 2.8-2.4 3.8-4.3 0 0-2.4-7-10-7-1.9 0-3.6.4-5 .9L4.7 6.5C6.9 5.6 9.3 5 12 5z" fill="currentColor"/>
      <path d="M4 4l16 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>


    <!-- v5.34.3: "Töröltek megjelenítése" ikon (ne legyen szűrő) -->
    <symbol id="i-trash-o" viewBox="0 0 24 24">
      <path d="M9 3h6l1 2h4v2H4V5h4l1-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M6 7l1 14h10l1-14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M10 11v7M14 11v7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-trash-o-x" viewBox="0 0 24 24">
      <path d="M9 3h6l1 2h4v2H4V5h4l1-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M6 7l1 14h10l1-14" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M10 11v7M14 11v7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M17 9l4 4m0-4l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-trash-eye-on" viewBox="0 0 24 24">
      <use href="#i-trash-o"/>
      <g transform="translate(8,11) scale(0.55)">
        <use href="#i-showall"/>
      </g>
    </symbol>
    <symbol id="i-trash-eye-off" viewBox="0 0 24 24">
      <use href="#i-trash-o"/>
      <g transform="translate(8,11) scale(0.55)">
        <use href="#i-showall"/>
      </g>
      <path d="M9 19 L19 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>


    <!-- X bezárás ikon -->
    <symbol id="i-x" viewBox="0 0 24 24">
      <path d="M7 7l10 10M17 7L7 17" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="i-deselect" viewBox="0 0 24 24">
      <path d="M5 5h10v2H7v8H5V5zm4 4h10v10H9V9zm2 2v6h6v-6h-6z" fill="currentColor"/>
      <path d="M18.3 5.7l-12.6 12.6-1.4-1.4 12.6-12.6 1.4 1.4z" fill="currentColor"/>
    </symbol>
    <symbol id="i-edit" viewBox="0 0 24 24">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
    </symbol>
    <symbol id="i-showall" viewBox="0 0 24 24">
      <path d="M12 5c5.5 0 9.7 4.5 10 7-.3 2.5-4.5 7-10 7S2.3 14.5 2 12c.3-2.5 4.5-7 10-7zm0 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" fill="currentColor"/>
    </symbol>
  
    <symbol id="i-excel" viewBox="0 0 24 24">
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M9 11l4 6M13 11l-4 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
</svg>

    <div class="toolbar">
    <button class="btn btn-filter btn-icon" id="btnFilter" title="Szűrés" aria-label="Szűrés"><svg class="ico" aria-hidden="true"><use href="#i-filter"></use></svg></button>
    <button class="btn btn-filter btn-icon" id="btnShowAll" style="display:none;" title="Összes megjelenítése" aria-label="Összes megjelenítése"><svg class="ico" aria-hidden="true"><use href="#i-showall"></use></svg></button>
    <button class="btn btn-filter btn-icon" id="btnSettings" title="Beállítások" aria-label="Beállítások"><svg class="ico" aria-hidden="true"><use href="#i-settings"></use></svg></button>
    <button class="btn btn-nav btn-icon" id="btnNavMode" title="Navigáció: észak felül" aria-label="Navigáció: észak felül"><svg class="ico" aria-hidden="true"><use href="#i-compass"></use></svg></button>
    <button class="btn btn-clear btn-icon" id="btnClear" title="Összes törlése" aria-label="Összes törlése"><svg class="ico" aria-hidden="true"><use href="#i-trash"></use></svg></button>
  </div>

  <div id="map"></div>
  <button id="btnMyLocFab" class="myloc-fab" title="Középre" aria-label="Középre">
    <span class="myloc-fab-ico" aria-hidden="true">➤</span>
    <span class="myloc-fab-text">Középre</span>
  </button>
  <div id="appVersion">v0.0.0</div>
  <div id="hint"></div>

  <div id="markerModal" class="modal">
    <div class="modal-content">
      <h3 id="markerModalTitle" style="margin:0 0 6px 0;">Objektum rögzítése</h3>
      <div id="markerModalHint" class="small">Bökés helyén jön létre, utána húzással finomítható.</div>

      <label>Város</label>
      <input id="fCity" placeholder="pl. Oroszlány">

      <label>Közterület név, típus</label>
      <input id="fStreet" placeholder="pl. Arany János utca">

      <label>Házszám</label>
      <input id="fHouse" placeholder="pl. 12">

      <div class="row">
        <div style="flex:1">
          <label>Típus</label>
          <div class="pick-wrap">
            <button type="button" class="pick-btn" id="fTypeBtn" aria-label="Típus választása">
              <span class="pick-btn-text" id="fTypeBtnText">Válassz...</span>
              <span class="pick-caret" aria-hidden="true">▾</span>
            </button>
            <input type="hidden" id="fType" value="" />
          </div>
        </div>
        <div style="flex:1">
          <label>Állapot</label>
          <div class="pick-wrap">
            <button type="button" class="pick-btn" id="fStatusBtn" aria-label="Állapot választása">
              <span class="pick-btn-text" id="fStatusBtnText">Válassz...</span>
              <span class="pick-caret" aria-hidden="true">▾</span>
            </button>
            <input type="hidden" id="fStatus" value="" />
          </div>
        </div>
      </div>

      <label>Megjegyzés (opcionális)</label>
      <textarea id="fNotes" placeholder="pl. festés kopott, csavar hiányzik..."></textarea>

      <div class="modal-actions marker-actions">
        <div class="left-actions">
          <button class="btn btn-ghost" id="btnAttachPhoto" type="button">Fénykép hozzárendelése (0)</button>
          <input id="photoInput" type="file" accept="image/*" multiple capture="environment" style="display:none" />
        </div>
        <div class="right-actions">
          <button class="btn btn-ghost" id="btnCancel">Mégse</button>
          <button class="btn btn-save" id="btnSave">Mentés</button>
        </div>
      </div>
    </div>
  </div>

  
  
  <div id="filterModal" class="modal">
    <div class="modal-content filter-modal">
<div class="settings-header">
        <div style="font-weight:800; font-size:20px;">Szűrés</div>
        <div style="display:flex; gap:8px; align-items:center;">
          
          <button class="btn btn-ghost btn-icon" id="filterShowBtn" type="button" title="Megjelenítés" aria-label="Megjelenítés" disabled>
            <svg class="ico" aria-hidden="true"><use href="#i-showall"></use></svg>
          </button>
          <button class="btn btn-ghost btn-icon" id="filterShowDeletedBtn" type="button" title="Töröltek megjelenítése" aria-label="Töröltek megjelenítése">
            <span class="ico ico-off" aria-hidden="true">
              <svg aria-hidden="true"><use href="#i-trash-o-x"></use></svg>
              <svg aria-hidden="true"><use href="#i-eye-off"></use></svg>
            </span>
            <span class="ico ico-on" aria-hidden="true">
              <svg aria-hidden="true"><use href="#i-trash-o"></use></svg>
              <svg aria-hidden="true"><use href="#i-eye"></use></svg>
            </span>
          </button>
          
          <button class="btn btn-ghost btn-icon" id="filterExcelBtn" type="button" title="Excel export" aria-label="Excel export">
            <svg class="ico" aria-hidden="true"><use href="#i-excel"></use></svg>
          </button>
<button class="btn btn-ghost btn-icon" id="sfClearAllFiltersBtn" type="button" title="Szűrések törlése" aria-label="Szűrések törlése">
            <svg class="ico" aria-hidden="true"><use href="#i-filter-x"></use></svg>
          </button>
                    <button class="btn btn-ghost btn-icon" id="filterDeleteSelectedBtn" type="button" title="Kijelöltek törlése" aria-label="Kijelöltek törlése">
            <svg class="ico" aria-hidden="true"><use href="#i-trash"></use></svg>
          </button>
          <button class="btn btn-ghost btn-icon" id="btnFilterClose" type="button" title="Bezár" aria-label="Bezár"><svg class="ico" aria-hidden="true"><use href="#i-x"></use></svg></button>
        </div>
      </div>

      <div class="settings-shell">
        <!-- Bal oldal: szűrési feltételek + műveletek -->
<!-- Jobb oldal: eredmény (a táblázat változatlan, csak a helye más) -->
        <div class="settings-content filter-content">
          <div class="table-scroll" id="sfTableScroll">
            <table class="filter-table" id="sfTable">
              <colgroup>
                <col style="width:6%">
                <col style="width:6%">
                <col style="width:34%">
                <col style="width:10%">
                <col style="width:10%">
                <col style="width:18%">
                <col style="width:16%">
                <col style="width:12%">
              </colgroup>
              <thead>
                <tr>
                  <th class="th-icon">
                  <button class="th-icon-btn" id="filterClearSelectionIconBtn" type="button" title="Kijelölés megszüntetése" aria-label="Kijelölés megszüntetése">
                    <svg class="ico" aria-hidden="true"><use href="#i-deselect"></use></svg>
                  </button>
                </th>
                  <th class="th-icon">
                    <svg class="ico" aria-hidden="true"><use href="#i-camera"></use></svg>
                  </th>
                  <th>
                    <div class="th-filter" id="sfAddressTh">
                      <span>Cím</span>
                      <button class="th-filter-btn" id="sfAddressFilterBtn" type="button" title="Szűrés" aria-label="Szűrés">
                        <svg class="ico" aria-hidden="true"><use href="#i-filter"></use></svg>
                      </button>
                      <div class="th-filter-pop" id="sfAddressPop" role="dialog" aria-label="Cím szűrés">
                        <input id="sfAddress" placeholder="Cím részlet" />
                      </div>
                    </div>
                  </th>
                  <th>
                    <div class="th-filter" id="sfTypeTh">
                      <span>Típus</span>
                      <button class="th-filter-btn" id="sfTypeFilterBtn" type="button" title="Szűrés" aria-label="Szűrés">
                        <svg class="ico" aria-hidden="true"><use href="#i-filter"></use></svg>
                      </button>
                      <div class="th-filter-pop" id="sfTypePop" role="dialog" aria-label="Típus szűrés">
                        <select id="sfType"></select>
                      </div>
                    </div>
                  </th>
                  <th>
                    <div class="th-filter" id="sfStatusTh">
                      <span>Állapot</span>
                      <button class="th-filter-btn" id="sfStatusFilterBtn" type="button" title="Szűrés" aria-label="Szűrés">
                        <svg class="ico" aria-hidden="true"><use href="#i-filter"></use></svg>
                      </button>
                      <div class="th-filter-pop" id="sfStatusPop" role="dialog" aria-label="Állapot szűrés">
                        <select id="sfStatus"></select>
                      </div>
                    </div>
                  </th>
                  <th>
                    <div class="th-filter" id="sfNotesTh">
                      <span>Megjegyzés</span>
                      <button class="th-filter-btn" id="sfNotesFilterBtn" type="button" title="Szűrés" aria-label="Szűrés">
                        <svg class="ico" aria-hidden="true"><use href="#i-filter"></use></svg>
                      </button>
                      <div class="th-filter-pop" id="sfNotesPop" role="dialog" aria-label="Megjegyzés szűrés">
                        <input id="sfNotes" placeholder="Megjegyzés részlet" />
                      </div>
                    </div>
                  </th>
                  <th>GPS</th>
                  <th>ID</th>
                </tr>
              </thead>
              <tbody id="sfList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal">
    <div class="modal-content settings-modal">
      <div class="settings-header">
        <div style="font-weight:800; font-size:20px;">Beállítások</div>
        <button class="btn btn-ghost" id="btnSettingsClose" type="button">Bezár</button>
      </div>

      <div class="settings-shell">
        <div class="settings-nav">
          <button class="settings-nav-item" data-page="type">Objektum típusa</button>
          <button class="settings-nav-item" data-page="status">Objektum állapota</button>
          <button class="settings-nav-item" data-page="users">Felhasználó kezelés</button>
        </div>

        <div class="settings-content" id="settingsContent">
          <h3 id="settingsTitle" style="margin:0 0 10px 0;">Objektum típusa</h3>
          <div class="small" id="settingsHint">Itt később a típusok kezelése (adatbázis, színek, bővítés/módosítás) lesz elérhető.</div>
          <div id="settingsExtra"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="photoGalleryModal" class="modal">
    <div class="modal-content" style="max-width: 760px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <h3 style="margin:0;">Fotók</h3>
        <button class="btn btn-ghost" id="btnPhotoGalleryCloseTop" type="button">Bezár</button>
      </div>
      <div id="photoGalleryMeta" style="margin:8px 0 12px 0; color:#555;"></div>
      <div id="photoGalleryGrid" class="photo-grid"></div>
      <div class="modal-actions" style="justify-content:flex-end;">
        <button class="btn btn-ghost" id="btnPhotoGalleryClose">Bezár</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/db.js"></script>
  <script src="js/version.js"></script>
  <script src="js/01_core.js"></script>
  <script src="js/11_photos.js"></script>
  <script src="js/10_markers_map.js"></script>
  <script src="js/05_misc.js"></script>
  <script src="js/02_location_nav.js"></script>
  <script src="js/03_ui_forms.js"></script>
  <script src="js/20_filter_export.js"></script>
  <script src="js/04_boot.js"></script>
  <div id="cmPickPanel" class="pick-panel" style="display:none"></div>
</body>
</html>
